<aside class="sidebar" [class.sidebar--collapsed]="collapsed()">
  <button class="sidebar__new" type="button" (click)="newSession.emit()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M8 2.5V13.5M2.5 8H13.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
    </svg>
    <span class="sidebar__new-label">New consultation</span>
  </button>

  <nav class="sidebar__list" aria-label="Consultation history">
    @for (session of sessions(); track session.id) {
      <button
        type="button"
        class="sidebar__item"
        [class.sidebar__item--active]="session.id === activeSessionId()"
        (click)="selectSession.emit(session.id)"
      >
        <span class="sidebar__item-dot" aria-hidden="true"></span>
        <span class="sidebar__item-text">
          <span class="sidebar__item-title">{{ session.title }}</span>
          <span class="sidebar__item-time">{{ relativeTime(session.createdAt) }} ago</span>
        </span>
        <span
          class="sidebar__item-delete"
          role="button"
          tabindex="0"
          aria-label="Delete consultation"
          (click)="onDelete($event, session.id)"
        >
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <path
              d="M3.5 4.5h9M6.5 4.5V3a1 1 0 0 1 1-1h1a1 1 0 0 1 1 1v1.5M4.5 4.5l.6 8a1 1 0 0 0 1 .94h3.8a1 1 0 0 0 1-.94l.6-8"
              stroke="currentColor"
              stroke-width="1.3"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>
      </button>
    } @empty {
      <p class="sidebar__empty">No consultations yet.</p>
    }
  </nav>

  <div class="sidebar__footer">
    <p class="sidebar__disclaimer">
      Informational support only — not a substitute for professional medical advice.
    </p>
  </div>
</aside>
