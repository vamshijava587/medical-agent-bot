<div class="welcome">
  <div class="welcome__mark">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <path
        d="M20 4l4 9 9 4-9 4-4 9-4-9-9-4 9-4 4-9z"
        stroke="var(--teal)"
        stroke-width="1.4"
        stroke-linejoin="round"
        fill="rgba(0,229,199,0.08)"
      />
    </svg>
  </div>

  <h2 class="welcome__title">Ask MedAI anything</h2>
  <p class="welcome__subtitle">
    A streaming medical assistant for understanding conditions, symptoms, and treatments.
  </p>

  <div class="welcome__grid">
    @for (card of suggestions; track card.title) {
      <button type="button" class="welcome__card" (click)="promptSelected.emit(card.prompt)">
        <span class="welcome__card-icon">
          @switch (card.icon) {
            @case ('pulse') {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 12h4l2-7 4 14 2-7h6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            }
            @case ('pill') {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="9" width="18" height="6" rx="3" stroke="currentColor" stroke-width="1.7"/><path d="M12 9v6" stroke="currentColor" stroke-width="1.7"/></svg>
            }
            @case ('thermometer') {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 14V4a2 2 0 1 0-4 0v10a4 4 0 1 0 4 0z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
            }
            @case ('heart') {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 20s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 5c-2.5 4.5-9.5 9-9.5 9z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
            }
          }
        </span>
        <span class="welcome__card-body">
          <span class="welcome__card-title">{{ card.title }}</span>
          <span class="welcome__card-prompt">{{ card.prompt }}</span>
        </span>
      </button>
    }
  </div>
</div>
